<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .neomorph-raised {
            box-shadow: -4px -4px 10px rgba(255, 255, 255, 0.8),

        }

        }

            background: rgba(251, 249, 245, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.4);
        }

            background: radial-gradient(circle at 30% 30%, theme('colors.primary-fixed-dim'), theme('colors.primary-container'));
            box-shadow:

                inset 10px 10px 30px rgba(255, 255, 255, 0.9),
                0 20px 40px -10px rgba(129, 81, 91, 0.3);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 193, 204, 0.4) 0%, rgba(251, 249, 245, 0) 70%);
