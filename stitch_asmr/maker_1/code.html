<script>
        // Simple interactions for prototyping
        function selectCore(colorClass) {
            const ball = document.getElementById('wip-ball');
            // Remove existing color classes (simplified approach)
            ball.className = ball.className.replace(/bg-\w+(-\d+)?/g, '');
            ball.classList.add(colorClass);
            
            // Add visual feedback to buttons (would be more robust in real app)
            event.currentTarget.parentElement.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-2', 'border-white/50');
                btn.classList.add('bg-surface', 'text-on-surface', 'border', 'border-white/20');
            });
            event.currentTarget.classList.add('bg-primary-container', 'text-on-primary-container', 'border-2', 'border-white/50');
            event.currentTarget.classList.remove('bg-surface', 'text-on-surface', 'border', 'border-white/20');
        }

        function setColor(colorClass) {
            const ball = document.getElementById('wip-ball');
            ball.className = ball.className.replace(/bg-\w+(-\d+)?/g, '');
            ball.classList.add(colorClass);
            
            // Highlight selected color
            event.currentTarget.parentElement.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('border-primary', 'border-2');
                btn.classList.add('border-transparent', 'border');
            });
            event.currentTarget.classList.add('border-primary', 'border-2');
            event.currentTarget.classList.remove('border-transparent', 'border');
        }

        function addPart(type) {
            const ball = document.getElementById('wip-ball');
            const part = document.createElement('div');
            
            const top = 15 + Math.random() * 60; 
            const left = 15 + Math.random() * 60;
            const rotation = Math.random() * 360;
            
            part.style.top = `${top}%`;
            part.style.left = `${left}%`;
            
            let baseClasses = 'absolute shadow-sm opacity-80 backdrop-blur-sm z-20 pointer-events-none transition-all duration-300';
            
            if (type === 'star') {
                part.className = `${baseClasses} w-4 h-4 bg-yellow-400 rounded-sm`;
                part.style.transform = `scale(0) rotate(${rotation}deg)`;
            } else if (type === 'glitter') {
                const colors = ['bg-pink-400', 'bg-blue-400', 'bg-green-400'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                part.className = `${baseClasses} w-2 h-2 rounded-full ${color}`;
                part.style.transform = `scale(0)`;
            } else if (type === 'pebble') {
                part.className = `${baseClasses} w-5 h-5 rounded-full bg-gray-400 shadow-inner`;
                part.style.transform = `scale(0)`;
            } else if (type === 'cube') {
                part.className = `${baseClasses} w-4 h-4 rounded-sm bg-purple-300`;
                part.style.transform = `scale(0) rotate(${rotation}deg)`;
            }

            ball.appendChild(part);
            
            // Trigger reflow and scale up
            void part.offsetWidth;
            
            if (type === 'star' || type === 'cube') {
                part.style.transform = `scale(1) rotate(${rotation}deg)`;
            } else {
                part.style.transform = `scale(1)`;
            }
        }
    </script>
