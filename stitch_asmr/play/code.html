<style>
        .wax-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }
        
        .particle-anim {
            animation: float-down 4s infinite ease-in-out;
        }
        
        @keyframes float-down {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(50px) rotate(45deg) scale(0.5); opacity: 0; }
        }

        .crush-effect:active {
            transform: scale(0.98);
            filter: brightness(1.1);
            transition: all 0.1s ease;
        }
        
        /* Neomorphic sunken well */
        .sunken-well {
            box-shadow: inset 4px 4px 8px rgba(129, 81, 91, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
        }
        
        /* Neomorphic raised button */
        .raised-btn {
            box-shadow: 4px 4px 10px rgba(129, 81, 91, 0.15), -4px -4px 10px rgba(255, 255, 255, 0.9);
            transition: all 0.2s ease;
        }
        .raised-btn:active {
            box-shadow: inset 4px 4px 8px rgba(129, 81, 91, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
            transform: translateY(2px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen overflow-hidden overscroll-none font-body-md select-none">
<!-- Ambient Background / Soft Lighting -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
</div>
<!-- Main Canvas Area -->
<main class="relative h-[1024px] w-full flex flex-col items-center justify-center z-10 px-container-margin">
<!-- Top HUD (Minimal) -->
<header class="absolute top-0 w-full flex justify-between items-start px-container-margin py-8 z-20">
<button class="w-12 h-12 rounded-full bg-surface/50 backdrop-blur-md flex items-center justify-center text-primary raised-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
<div class="flex flex-col items-end gap-2">
<div class="px-4 py-2 rounded-full bg-surface/60 backdrop-blur-md sunken-well flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm">headphones</span>
<span class="font-label-sm text-label-sm">ASMR On</span>
</div>
</div>
</header>
<!-- The WaxBall (Interactive Area) -->
<div class="relative w-full max-w-sm aspect-square mx-auto flex items-center justify-center cursor-pointer crush-effect group">
<!-- High-detail WaxBall Image -->
<div class="relative w-72 h-72 rounded-full shadow-[0_20px_50px_-10px_rgba(129,81,91,0.3)] overflow-hidden bg-primary-container z-10">
<img class="w-full h-full object-cover rounded-full" data-alt="A highly detailed, macro photograph of a perfectly round, textured wax ball sitting in a softly lit space. The wax has a semi-translucent, milky quality with swirling patterns of pastel pinks, creams, and soft mint greens. The lighting is soft and studio-quality, creating a subtle subsurface scattering effect that makes the wax look tactile and 'squishy'. The style is photorealistic neomorphism, focusing on material texture and sensory comfort." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4vFJ_PMIHT-45m0SScTlmekjhwGJGFhUpDjpxQOTEGjl6Rfh7ZlGEt9fyeFVDARm9i5AZywVnPNpxGaJnDpdUQyyj5-l-3oFLhRkCHC-lQZ3YUoyqO9HSXqRVNiUzASJNeLJb6ZS_hK0ZhjvGnMety9A80kNMsSh2uQw7OGSpURQd8JhXf2DxGQDjo9JGGV9ypzZ8T_4-0gFHr_S0ICgzYAiRA4OnRpKbozKnp_vR48R7oidwa5PQlvkwHAjuyadVquT0-UF40O0x"/>
<!-- Overlay Texture for added 'Wax' feel -->
<div class="absolute inset-0 wax-texture rounded-full z-20 mix-blend-overlay opacity-50"></div>
<!-- Simulated 'Cracks' indicating it's ready to crush -->
<svg class="absolute inset-0 w-full h-full z-30 pointer-events-none opacity-60" viewbox="0 0 100 100">
<path d="M20,50 Q30,45 40,55 T60,40 T80,50" fill="none" stroke="rgba(255,255,255,0.8)" stroke-linecap="round" stroke-width="0.5"></path>
<path d="M40,20 Q45,30 35,40 T45,60" fill="none" stroke="rgba(255,255,255,0.6)" stroke-linecap="round" stroke-width="0.3"></path>
</svg>
</div>
<!-- Floating Particles (already broken off) -->
<div class="absolute w-full h-full z-0 pointer-events-none">
<div class="absolute top-1/4 left-0 w-4 h-4 bg-primary-container rounded-full shadow-sm particle-anim" style="animation-delay: 0s;"></div>
<div class="absolute bottom-1/3 right-10 w-3 h-3 bg-secondary-container rounded-full shadow-sm particle-anim" style="animation-delay: 1.5s;"></div>
<div class="absolute top-1/2 -left-4 w-5 h-5 bg-surface rounded-md transform rotate-12 shadow-sm particle-anim" style="animation-delay: 0.7s;"></div>
<div class="absolute bottom-1/4 left-1/4 w-2 h-2 bg-primary-fixed rounded-full shadow-sm particle-anim" style="animation-delay: 2s;"></div>
</div>
<!-- Interaction Hint -->
<div class="absolute -bottom-12 left-1/2 transform -translate-x-1/2 text-on-surface-variant font-label-md text-label-md opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none whitespace-nowrap">
                터치하거나 꾹 눌러서 부수세요
            </div>
</div>
<!-- Bottom Action Area -->
<footer class="absolute bottom-0 w-full px-container-margin pb-12 pt-8 z-20 flex justify-center bg-gradient-to-t from-surface via-surface/80 to-transparent">
<button class="raised-btn bg-surface px-8 py-4 rounded-xl flex items-center gap-3 text-primary font-label-md text-label-md w-full max-w-xs justify-center hover:bg-primary-container/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">archive</span>
                Restore &amp; Save to Library
            </button>
</footer>
</main>
<script>

        document.querySelector('.crush-effect').addEventListener('mousedown', function() {

</body></html>
