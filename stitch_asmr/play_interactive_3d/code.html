                서재로 저장
            </button>

</main>
<script>
function saveToLibrary() {
    const dataStr = localStorage.getItem('waxball_wip');
    if (dataStr) {
        const data = JSON.parse(dataStr);
        let library = [];
        const libStr = localStorage.getItem('waxball_library');
        if (libStr) {
            library = JSON.parse(libStr);
        }
        
        const d = new Date();
        data.date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        
        library.push(data);
        localStorage.setItem('waxball_library', JSON.stringify(library));
    }
    window.location.href = '../library/code.html';
}
</script>

        
        <!-- STITCH_THREEJS_START:ANIMATION_9 class="" -->
<div class="" style="display:block;width:100%;height:100%;min-height:200px;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 0.8);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Core WaxBall (Squishy effect logic)
const geometry = new THREE.SphereGeometry(2, 64, 64);

let ballColor = 0xffc1cc; // default
try {
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    let dataStr = null;
    
    if (idParam !== null) {
        const libStr = localStorage.getItem('waxball_library');
        if (libStr) {
            const library = JSON.parse(libStr);
            if (library[idParam]) {
                dataStr = JSON.stringify(library[idParam]);
            }
        }
        // Hide "Save to Library" button if we are playing an already saved item
        const footer = document.getElementById('footer-actions');
        if (footer) footer.style.display = 'none';
    } else {
        dataStr = localStorage.getItem('waxball_wip');
    }

    if(dataStr) {
        const data = JSON.parse(dataStr);
        const match = data.className.match(/bg-[^\s]+/);
        const colorMap = {
            'bg-white': 0xffffff,
            'bg-gray-800': 0x1f2937,
            'bg-blue-200': 0xbfdbfe,
            'bg-primary-container': 0xffc1cc,
            'bg-secondary-container': 0xbceddc,
            'bg-yellow-100': 0xfef08a,
            'bg-purple-100': 0xf3e8ff,
            'bg-[#d0c8c0]': 0xd0c8c0
        };
        if(match && colorMap[match[0]] !== undefined) {
            ballColor = colorMap[match[0]];
        }
        // Load custom parts overlay
        document.getElementById('partsOverlay').innerHTML = data.innerHTML;
    }
} catch(e) {}

const material = new THREE.MeshPhongMaterial({
    color: ballColor,
    shininess: 100,
    transparent: true,
    opacity: 0.9
});
const ball = new THREE.Mesh(geometry, material);
scene.add(ball);

camera.position.z = 5;

// Physics / Interaction states
let isPressing = false;
let mouse = new THREE.Vector2();
const clock = new THREE.Clock();

// Deform parameters
const deformIntensity = 0.5;
const originalVertices = geometry.attributes.position.array.slice();

function deform(point, intensity) {
    const positions = geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
        const vx = positions[i];
        const vy = positions[i + 1];
        const vz = positions[i + 2];
        
        const dist = Math.sqrt((vx - point.x) ** 2 + (vy - point.y) ** 2 + (vz - point.z) ** 2);
        if (dist < 1.5) {
            const factor = (1.5 - dist) * intensity;
            positions[i] -= (vx - point.x) * factor;
            positions[i + 1] -= (vy - point.y) * factor;
            positions[i + 2] -= (vz - point.z) * factor;
        }
    }
    geometry.attributes.position.needsUpdate = true;
}

function restore() {
    const positions = geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i++) {
        positions[i] += (originalVertices[i] - positions[i]) * 0.1;
    }
    geometry.attributes.position.needsUpdate = true;
}

// Particle System for Cracks
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 500;
const posArray = new Float32Array(particlesCount * 3);
const velArray = new Float32Array(particlesCount * 3);
for(let i=0; i<particlesCount*3; i++) {
    posArray[i] = 0;
    velArray[i] = (Math.random() - 0.5) * 0.1;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({ size: 0.15, color: ballColor });
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
particles.visible = false;
scene.add(particles);

function explode(point) {
    particles.visible = true;
    const positions = particles.geometry.attributes.position.array;
    for(let i=0; i<particlesCount; i++) {
        positions[i*3] = point.x;
        positions[i*3+1] = point.y;
        positions[i*3+2] = point.z;
        velArray[i*3] = (Math.random() - 0.5) * 0.4;
        velArray[i*3+1] = (Math.random() - 0.5) * 0.4;
        velArray[i*3+2] = (Math.random() - 0.5) * 0.4;
    }
    particles.geometry.attributes.position.needsUpdate = true;
}

const raycaster = new THREE.Raycaster();

function onPointerMove(event) {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    
    if (isPressing) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ball);
        if (intersects.length > 0) {
            deform(intersects[0].point, 0.2);
        }
    }
}

function onPointerDown(event) {
    if (event) {
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }
    isPressing = true;
    const partsOverlay = document.getElementById('partsOverlay');
    if(partsOverlay) {
        partsOverlay.style.transform = `translate(-50%, -50%) scale(${0.95 + Math.random()*0.05}) rotate(${(Math.random()-0.5)*10}deg)`;
        partsOverlay.style.opacity = Math.max(0.3, parseFloat(partsOverlay.style.opacity || 1) - 0.15);
    }
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ball);
    if (intersects.length > 0) {
        deform(intersects[0].point, 0.4);
        explode(intersects[0].point);
    }
}

function onPointerUp() {
    isPressing = false;
    const partsOverlay = document.getElementById('partsOverlay');
    if(partsOverlay) partsOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
}

container.addEventListener('pointermove', onPointerMove);
container.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointerup', onPointerUp);

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    

    
    if (particles.visible) {
        const positions = particles.geometry.attributes.position.array;
        for(let i=0; i<particlesCount; i++) {
            positions[i*3] += velArray[i*3];
            positions[i*3+1] += velArray[i*3+1];
            positions[i*3+2] += velArray[i*3+2];
            velArray[i*3+1] -= 0.005; // Gravity
        }
        particles.geometry.attributes.position.needsUpdate = true;
    }
    
    // Stop ball rotation
    // ball.rotation.y += 0.005;
    
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

})();
</script>
</div>
