<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_9 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 0.8);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Core WaxBall (Squishy effect logic)
const geometry = new THREE.SphereGeometry(2, 64, 64);
const material = new THREE.MeshPhongMaterial({
    color: 0xffc1cc,
    shininess: 100,
    transparent: true,
    opacity: 0.9
});
const ball = new THREE.Mesh(geometry, material);
scene.add(ball);

camera.position.z = 5;

// Physics / Interaction states
let isPressing = false;
let mouse = new THREE.Vector2();
const clock = new THREE.Clock();

// Deform parameters
const deformIntensity = 0.5;
const originalVertices = geometry.attributes.position.array.slice();

function deform(point, intensity) {
    const positions = geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
        const vx = positions[i];
        const vy = positions[i + 1];
        const vz = positions[i + 2];
        
        const dist = Math.sqrt((vx - point.x) ** 2 + (vy - point.y) ** 2 + (vz - point.z) ** 2);
        if (dist < 1.5) {
            const factor = (1.5 - dist) * intensity;
            positions[i] -= (vx - point.x) * factor;
            positions[i + 1] -= (vy - point.y) * factor;
            positions[i + 2] -= (vz - point.z) * factor;
        }
    }
    geometry.attributes.position.needsUpdate = true;
}

function restore() {
    const positions = geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i++) {
        positions[i] += (originalVertices[i] - positions[i]) * 0.1;
    }
    geometry.attributes.position.needsUpdate = true;
}

// Particle System for Cracks
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 500;
const posArray = new Float32Array(particlesCount * 3);
const velArray = new Float32Array(particlesCount * 3);
for(let i=0; i<particlesCount*3; i++) {
    posArray[i] = 0;
    velArray[i] = (Math.random() - 0.5) * 0.1;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
particles.visible = false;
scene.add(particles);

function explode(point) {
    particles.visible = true;
    const positions = particles.geometry.attributes.position.array;
    for(let i=0; i<particlesCount; i++) {
        positions[i*3] = point.x;
        positions[i*3+1] = point.y;
        positions[i*3+2] = point.z;
        velArray[i*3] = (Math.random() - 0.5) * 0.2;
        velArray[i*3+1] = (Math.random() - 0.5) * 0.2;
        velArray[i*3+2] = (Math.random() - 0.5) * 0.2;
    }
    particles.geometry.attributes.position.needsUpdate = true;
}

const raycaster = new THREE.Raycaster();

function onPointerMove(event) {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    
    if (isPressing) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ball);
        if (intersects.length > 0) {
            deform(intersects[0].point, 0.2);
        }
    }
}

function onPointerDown() {
    isPressing = true;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ball);
    if (intersects.length > 0) {
        explode(intersects[0].point);
        // Dispatch custom event for sound
        window.dispatchEvent(new CustomEvent('wax-crack'));
    }
}

function onPointerUp() {
    isPressing = false;
}

container.addEventListener('pointermove', onPointerMove);
container.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointerup', onPointerUp);

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    
    if (!isPressing) {
        restore();
    }
    
    if (particles.visible) {
        const positions = particles.geometry.attributes.position.array;
        for(let i=0; i<particlesCount; i++) {
            positions[i*3] += velArray[i*3];
            positions[i*3+1] += velArray[i*3+1];
            positions[i*3+2] += velArray[i*3+2];
            velArray[i*3+1] -= 0.005; // Gravity
        }
        particles.geometry.attributes.position.needsUpdate = true;
    }
    
    ball.rotation.y += 0.005;
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_9 -->
</body>
</html>
